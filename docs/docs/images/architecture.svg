<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura Jarvis</title>
  <desc id="desc">Diagrama da arquitetura do Jarvis com frontend, backend, segurança, banco, IA e efeito desktop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07121f"/>
      <stop offset="100%" stop-color="#10273f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f2136"/>
      <stop offset="100%" stop-color="#173353"/>
    </linearGradient>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#8fb5d8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#02101c" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <text x="50" y="62" fill="#eaf5ff" font-size="34" font-family="Verdana" font-weight="700">Jarvis • Arquitetura de Produção (Visão Geral)</text>
  <text x="50" y="95" fill="#9ec3e6" font-size="18" font-family="Verdana">FastAPI + Socket.IO + Security Policy + Visual FX + Web Dashboard</text>

  <rect x="40" y="130" width="1320" height="640" rx="22" fill="rgba(255,255,255,0.03)" stroke="#2f4f72"/>

  <rect x="90" y="210" width="280" height="180" rx="16" fill="url(#panel)" stroke="#4f7ca6" filter="url(#shadow)"/>
  <text x="118" y="252" fill="#dff0ff" font-size="24" font-family="Verdana" font-weight="700">Frontend Web</text>
  <text x="118" y="284" fill="#b5d4ee" font-size="16" font-family="Verdana">Next.js dashboard</text>
  <text x="118" y="308" fill="#b5d4ee" font-size="16" font-family="Verdana">Login JWT</text>
  <text x="118" y="332" fill="#b5d4ee" font-size="16" font-family="Verdana">Eventos em tempo real</text>

  <rect x="90" y="430" width="280" height="160" rx="16" fill="url(#panel)" stroke="#4f7ca6" filter="url(#shadow)"/>
  <text x="118" y="472" fill="#dff0ff" font-size="24" font-family="Verdana" font-weight="700">Desktop FX</text>
  <text x="118" y="504" fill="#b5d4ee" font-size="16" font-family="Verdana">scripts/jarvis_fx.py</text>
  <text x="118" y="528" fill="#b5d4ee" font-size="16" font-family="Verdana">Orb reativo</text>
  <text x="118" y="552" fill="#b5d4ee" font-size="16" font-family="Verdana">fx-on / fx-off</text>

  <rect x="500" y="190" width="430" height="430" rx="18" fill="url(#panel)" stroke="#63a4dc" filter="url(#shadow)"/>
  <text x="530" y="234" fill="#ffffff" font-size="28" font-family="Verdana" font-weight="700">Backend Core</text>
  <text x="530" y="268" fill="#c9e2f7" font-size="17" font-family="Verdana">main.py (FastAPI + Socket.IO)</text>
  <text x="530" y="295" fill="#c9e2f7" font-size="17" font-family="Verdana">/api/auth/login (JWT)</text>
  <text x="530" y="322" fill="#c9e2f7" font-size="17" font-family="Verdana">/api/execute (JWT + policy + allowlist)</text>

  <rect x="530" y="352" width="370" height="112" rx="12" fill="rgba(13,39,64,0.8)" stroke="#507ca4"/>
  <text x="552" y="386" fill="#dff0ff" font-size="20" font-family="Verdana" font-weight="700">Conscience Layer</text>
  <text x="552" y="412" fill="#bcd8f0" font-size="15" font-family="Verdana">Bloqueia padrões perigosos</text>
  <text x="552" y="434" fill="#bcd8f0" font-size="15" font-family="Verdana">Valida comandos permitidos</text>

  <rect x="990" y="180" width="320" height="180" rx="16" fill="url(#panel)" stroke="#4f7ca6" filter="url(#shadow)"/>
  <text x="1020" y="224" fill="#e8f4ff" font-size="24" font-family="Verdana" font-weight="700">Data Layer</text>
  <text x="1020" y="256" fill="#b5d4ee" font-size="16" font-family="Verdana">PostgreSQL (prod)</text>
  <text x="1020" y="280" fill="#b5d4ee" font-size="16" font-family="Verdana">SQLite fallback (dev)</text>
  <text x="1020" y="304" fill="#b5d4ee" font-size="16" font-family="Verdana">SQLAlchemy models</text>

  <rect x="990" y="390" width="320" height="230" rx="16" fill="url(#panel)" stroke="#4f7ca6" filter="url(#shadow)"/>
  <text x="1020" y="432" fill="#e8f4ff" font-size="24" font-family="Verdana" font-weight="700">AI + Ops</text>
  <text x="1020" y="464" fill="#b5d4ee" font-size="16" font-family="Verdana">Ollama / Llama (integração)</text>
  <text x="1020" y="488" fill="#b5d4ee" font-size="16" font-family="Verdana">systemd service</text>
  <text x="1020" y="512" fill="#b5d4ee" font-size="16" font-family="Verdana">pytest básico</text>
  <text x="1020" y="536" fill="#b5d4ee" font-size="16" font-family="Verdana">scripts utilitários</text>

  <path d="M370 300 L500 300" stroke="#8fb5d8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M370 500 L500 500" stroke="#8fb5d8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M930 290 L990 270" stroke="#8fb5d8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M930 430 L990 470" stroke="#8fb5d8" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="50" y="798" fill="#87add0" font-size="15" font-family="Verdana">Fluxo principal: Cliente/FX → Backend → Policy/Auth → Execução controlada → Eventos Socket.IO</text>
</svg>
