<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jarvis • Site Oficial do Projeto</title>
  <meta name="description" content="Site oficial do Jarvis: guia completo, documentação, funcionalidades, changelog, kseven, downloads, autores e roadmap." />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/viewer.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div class="brand">Jarvis</div>
      <nav class="nav" id="mainNav">
        <button id="menuToggle" aria-expanded="false" style="background:transparent;border:1px solid transparent;color:var(--muted);padding:6px 10px;border-radius:8px;display:none">Menu</button>
        <div id="menuItems">
          <a href="index.html#visao-geral">Visão Geral</a>
          <a href="index.html#guia">Guia</a>
          <a href="index.html#funcionalidades">Funcionalidades</a>
          <a href="index.html#docs">Documentação</a>
          <a href="index.html#versoes">Versionamento</a>
          <a href="index.html#downloads">Downloads</a>
          <a href="index.html#autores">Autores</a>
        </div>
      </nav>
    </header>

    <section class="section" id="docs">
      <h2>Guia Rápido</h2>
  <div style="display: flex; gap: 20px;">
    <!-- Barra lateral com a lista de arquivos -->
    <aside id="sidebar" style="width: 200px;">
      <button id="toggleMenu">📁 Arquivos</button>
      <ul id="fileList" class="file-list"></ul>
    </aside>

    <!-- Área onde o conteúdo do Markdown será exibido -->
    <article class="card" style="flex: 1; position: relative;">
      <div id="spinner" style="display: none;">Carregando...</div>
      <div id="doc" class="markdown-body">
        <!-- O conteúdo do .md entrará aqui -->
      </div>
    </article>
  </div>
</section>

    <footer>
      Jarvis • Site completo de documentação e release • Última atualização: 2026-05-03.
    </footer>
  </main>
  <script src="assets/scripts.js"></script>
  <script src="assets/viewer.js"></script>
</body>
</html>
