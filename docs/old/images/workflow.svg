<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc">
  <title id="title">Workflow Jarvis</title>
  <desc id="desc">Fluxo de execução do Jarvis com validação de segurança e feedback em tempo real.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#091628"/>
      <stop offset="100%" stop-color="#122c47"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f2f8ff"/>
      <stop offset="100%" stop-color="#d9ebfb"/>
    </linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#84b4dd"/>
    </marker>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <text x="50" y="62" fill="#eff8ff" font-size="34" font-family="Verdana" font-weight="700">Workflow de Ação do Jarvis</text>
  <text x="50" y="96" fill="#a5c9e8" font-size="18" font-family="Verdana">Do login até o retorno de resultado com eventos realtime</text>

  <rect x="70" y="160" width="220" height="120" rx="16" fill="url(#box)"/>
  <text x="95" y="205" fill="#0d2943" font-size="23" font-family="Verdana" font-weight="700">1. Login</text>
  <text x="95" y="235" fill="#214866" font-size="16" font-family="Verdana">Usuário recebe JWT</text>

  <rect x="350" y="160" width="250" height="120" rx="16" fill="url(#box)"/>
  <text x="375" y="205" fill="#0d2943" font-size="23" font-family="Verdana" font-weight="700">2. Conexão</text>
  <text x="375" y="235" fill="#214866" font-size="16" font-family="Verdana">Socket.IO + token</text>

  <rect x="660" y="160" width="300" height="120" rx="16" fill="url(#box)"/>
  <text x="685" y="205" fill="#0d2943" font-size="23" font-family="Verdana" font-weight="700">3. /api/execute</text>
  <text x="685" y="235" fill="#214866" font-size="16" font-family="Verdana">Comando enviado ao backend</text>

  <rect x="1020" y="160" width="300" height="120" rx="16" fill="url(#box)"/>
  <text x="1045" y="205" fill="#0d2943" font-size="23" font-family="Verdana" font-weight="700">4. Segurança</text>
  <text x="1045" y="235" fill="#214866" font-size="16" font-family="Verdana">JWT + conscience + allowlist</text>

  <rect x="260" y="390" width="360" height="150" rx="16" fill="url(#box)"/>
  <text x="290" y="437" fill="#0d2943" font-size="24" font-family="Verdana" font-weight="700">5. Execução Controlada</text>
  <text x="290" y="468" fill="#214866" font-size="16" font-family="Verdana">subprocess (bash) com monitoramento</text>
  <text x="290" y="494" fill="#214866" font-size="16" font-family="Verdana">stdout/stderr capturados</text>

  <rect x="700" y="390" width="600" height="150" rx="16" fill="url(#box)"/>
  <text x="730" y="437" fill="#0d2943" font-size="24" font-family="Verdana" font-weight="700">6. Retorno em Tempo Real</text>
  <text x="730" y="468" fill="#214866" font-size="16" font-family="Verdana">Eventos: executing • success • error</text>
  <text x="730" y="494" fill="#214866" font-size="16" font-family="Verdana">Dashboard web + Jarvis FX desktop atualizados</text>

  <path d="M290 220 L350 220" stroke="#84b4dd" stroke-width="4" marker-end="url(#arr)"/>
  <path d="M600 220 L660 220" stroke="#84b4dd" stroke-width="4" marker-end="url(#arr)"/>
  <path d="M960 220 L1020 220" stroke="#84b4dd" stroke-width="4" marker-end="url(#arr)"/>
  <path d="M1170 280 L1170 390" stroke="#84b4dd" stroke-width="4" marker-end="url(#arr)"/>
  <path d="M1020 465 L620 465" stroke="#84b4dd" stroke-width="4" marker-end="url(#arr)"/>

  <text x="70" y="640" fill="#9ec2e2" font-size="16" font-family="Verdana">Resultado: operações autenticadas, filtradas por policy e com feedback visual imediato.</text>
</svg>
