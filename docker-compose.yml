version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: jarvis
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://jarvis:jarvis@db:5432/jarvis
      JARVIS_JWT_SECRET: __REPLACE_ME__
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:cached

volumes:
  db-data:
